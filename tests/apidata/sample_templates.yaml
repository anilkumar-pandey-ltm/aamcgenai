# PrestaShop API test data templates with generators
name: prestashop_customer_template
description: Template for generating PrestaShop customer data dynamically
template:
  customer:
    firstname: "{{firstName}}"
    lastname: "{{lastName}}"
    email: "{{email}}"
    passwd: "{{password}}"
    id_default_group: 3
    id_gender: "{{gender}}"
    birthday: "{{birthday}}"
    newsletter: "{{newsletter}}"
    active: 1

