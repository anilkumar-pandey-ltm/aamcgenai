# PrestaShop Customer test data sets
- name: prestashop_valid_customer
  description: Valid customer data for PrestaShop API creation
  tags: ["prestashop", "customers", "create", "positive", "api"]
  environment: ["prestashop_local", "dev", "staging", "api"]
  data:
    customer:
      firstname: "John"
      lastname: "Doe"
      email: "john.doe.test@example.com"
      passwd: "TestPassword123!"
      id_default_group: 3
      id_gender: 1
      birthday: "1990-01-01"
      newsletter: 1
      active: 1

- name: prestashop_customer_with_address
  description: Customer data with complete address for integrated testing
  tags: ["prestashop", "customers", "address", "integrated", "positive"]
  environment: ["prestashop_local", "dev", "staging", "api"]
  data:
    customer:
      firstname: "Jane"
      lastname: "Smith"
      email: "jane.smith.test@example.com"
      passwd: "TestPassword456!"
      id_default_group: 3
      id_gender: 2
      birthday: "1985-05-15"
      newsletter: 1
      active: 1
    address:
      alias: "Home"
      firstname: "Jane"
      lastname: "Smith"
      company: "Test Company"
      address1: "123 Test Street"
      address2: "Apt 4B"
      postcode: "12345"
      city: "Test City"
      id_country: 21  # United States (you may need to adjust based on your PrestaShop setup)
      id_state: 1     # You may need to adjust based on your setup
      phone: "555-123-4567"

